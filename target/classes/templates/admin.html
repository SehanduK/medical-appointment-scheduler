<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Add Doctor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h2>Admin: Add New Doctor</h2>
<hr>

<div th:if="${param.success}" style="color: green;">
    Doctor saved successfully!
</div>

<div th:if="${param.error != null and param.error[0] == 'duplicate'}" style="color: red;">
    Error: This doctor already exists with the same specialization.
</div>

<div th:if="${param.error != null and param.error[0] == 'missing_fields'}" style="color: red;">
    Error: Both Name and Specialization are required.
</div>

<form th:action="@{/admin/save-doctor}" th:object="${doctor}" method="post">
    <!-- Doctor Name -->
    <div class="mb-3">
        <label class="form-label">Doctor Name:</label>
        <input type="text" th:field="*{name}" class="form-control" placeholder="Dr. John Smith" required>
    </div>

    <!-- Specialization -->
    <div class="mb-3">
        <label class="form-label">Specialization:</label>
        <p class="small text-muted">Select an existing one or type a new specialty below.</p>

        <input type="text" th:field="*{specialization}" class="form-control"
               list="specialtyOptions" placeholder="e.g. Cardiology or Enter New" required>

        <datalist id="specialtyOptions">
            <option value="Cardiologist">
            <option value="Dermatologist">
            <option value="Neurologist">
            <option value="General Physician">
        </datalist>
    </div>

    <div class="mb-3">
        <form th:action="@{/admin/save-doctor}" th:object="${doctor}" method="post">
            <button type="submit">Save Doctor</button>
        </form>
<!--        <a th:href="@{/channeling.html}" class="btn btn-secondary">View Booking Page</a>-->
        <button type = "submit">
            <a th:href="@{/admin/all-doctors}">
                Check Registered Doctors
            </a>
        </button>
            <button type = "submit">
                <a href="/" class="text-slate-500 hover:text-emerald-400 text-xs transition-colors duration-300 flex items-center justify-center">
                    Return to Public Portal
                </a>
            </button>
    </div>

</form>

</body>
</html>

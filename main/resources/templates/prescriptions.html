<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Prescription Management - Add</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h2>Prescription Management: Add New Prescription</h2>
<hr>

<div th:if="${param.success}" class="alert alert-success">
    Prescription saved successfully!
</div>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<form th:action="@{/prescription/save}" th:object="${prescription}" method="post">

    <!-- Patient dropdown — uses p.name (the correct field from Patient.java) -->
    <div class="mb-3">
        <label class="form-label">Patient:</label>
        <select name="patientId" class="form-control" required>
            <option value="">-- Select Patient --</option>
            <option th:each="p : ${patients}"
                    th:value="${p.id}"
                    th:text="${p.name}">
            </option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Medication:</label>
        <input type="text" th:field="*{medication}" class="form-control"
               placeholder="e.g. Amoxicillin" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Dosage:</label>
        <input type="text" th:field="*{dosage}" class="form-control"
               placeholder="e.g. 500mg twice daily" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Date Issued:</label>
        <input type="date" th:field="*{dateIssued}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Notes:</label>
        <textarea th:field="*{notes}" class="form-control" rows="3"
                  placeholder="Additional notes..."></textarea>
    </div>

    <div class="mb-3">
        <button type="submit" class="btn btn-primary">Save Prescription</button>
        <a th:href="@{/prescription/all}" class="btn btn-secondary">View All Prescriptions</a>
        <a href="/" class="btn btn-outline-secondary">Return to Portal</a>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">Dashboard</a>
    </div>

</form>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Add Doctor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<div class="card shadow-sm mt-5 border-0">
    <div class="card-header bg-primary text-white p-3">
        <h4 class="mb-0"><i class="bi bi-people-fill"></i> Registered Medical Professionals</h4>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Doctor Name</th>
                    <th>Field of Expertise</th>
                    <th class="text-center">Manage</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="doc : ${allDoctors}" class="align-middle">
                    <td class="ps-4">
                        <span class="badge bg-secondary text-white" th:text="${doc.id}"></span>
                    </td>
                    <td>
                        <div class="fw-bold text-primary" th:text="${doc.name}"></div>
                    </td>
                    <td>
                        <span class="text-muted" th:text="${doc.department != null ? doc.department.name : 'N/A'}"></span>
                    </td>
                    <td class="text-center">

                        <a th:href="@{/admin/delete/{id}(id=${doc.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Are you sure you want to delete this doctor?')">Delete</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(allDoctors)}">
                    <td colspan="4" class="text-center py-5 text-muted">
                        No doctors found in the database.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <button type = "submit">
        <a href="/" class="text-slate-500 hover:text-emerald-400 text-xs transition-colors duration-300 flex items-center justify-center">
            Return to Public Portal</a>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">Dashboard</a>
    </button>
</div>
</body>
</html>

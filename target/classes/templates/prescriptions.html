
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Prescription Management - Add</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h2>Prescription Management: Add New Prescription</h2>
<hr>

<div th:if="${param.success}" style="color: green;">
    Prescription saved successfully!
</div>

<div th:if="${param.error != null and param.error[0] == 'duplicate'}" style="color: red;">
    Error: This prescription already exists for that patient and medication.
</div>

<div th:if="${param.error != null and param.error[0] == 'missing_fields'}" style="color: red;">
    Error: Patient Name, Doctor Name, Medication, and Dosage are all required.
</div>

<form th:action="@{/prescription/save}" th:object="${prescription}" method="post">

    <div class="mb-3">
        <label class="form-label">Patient Name:</label>
        <input type="text" th:field="*{patientName}" class="form-control" placeholder="e.g. John Perera" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Doctor Name:</label>
        <input type="text" th:field="*{doctorName}" class="form-control" placeholder="e.g. Dr. Smith" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Medication:</label>
        <input type="text" th:field="*{medication}" class="form-control" placeholder="e.g. Amoxicillin" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Dosage:</label>
        <input type="text" th:field="*{dosage}" class="form-control" placeholder="e.g. 500mg twice daily" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Date Issued:</label>
        <input type="date" th:field="*{dateIssued}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Notes:</label>
        <textarea th:field="*{notes}" class="form-control" rows="3" placeholder="Additional notes..."></textarea>
    </div>

    <div class="mb-3">
        <button type="submit" class="btn btn-primary">Save Prescription</button>
        <a th:href="@{/prescription/all}" class="btn btn-secondary">View All Prescriptions</a>
        <a href="/" class="btn btn-outline-secondary">Return to Portal</a>
    </div>

</form>

</body>
</html>

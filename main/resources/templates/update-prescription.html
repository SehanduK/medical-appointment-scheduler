
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Prescription Management - Edit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h2>Edit Prescription</h2>
<hr>

<form th:action="@{/prescription/update/{id}(id=${prescription.id})}" th:object="${prescription}" method="post">

    <div class="mb-3">
        <label class="form-label">Patient Name:</label>
        <input type="text" th:field="*{patientName}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Doctor Name:</label>
        <input type="text" th:field="*{doctorName}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Medication:</label>
        <input type="text" th:field="*{medication}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Dosage:</label>
        <input type="text" th:field="*{dosage}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Date Issued:</label>
        <input type="date" th:field="*{dateIssued}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Notes:</label>
        <textarea th:field="*{notes}" class="form-control" rows="3"></textarea>
    </div>

    <div class="mb-3">
        <button type="submit" class="btn btn-success">Update Prescription</button>
        <a th:href="@{/prescription/all}" class="btn btn-secondary">Cancel</a>
    </div>

</form>

</body>
</html>

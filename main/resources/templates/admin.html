<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .portal-wrapper {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }
        .portal-wrapper h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .portal-wrapper p {
            color: #6c757d;
            margin-bottom: 40px;
        }
        .option-card {
            border: none;
            border-radius: 16px;
            padding: 40px 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: block;
            color: inherit;
            height: 100%;
        }
        .option-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            color: inherit;
        }
        .option-card.doctor {
            background: linear-gradient(135deg, #1d6efd22, #ffffff);
            border: 2px solid #1d6efd;
        }
        .option-card.prescription {
            background: linear-gradient(135deg, #19875422, #ffffff);
            border: 2px solid #198754;
        }
        .option-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }
        .option-card h4 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .option-card p {
            font-size: 0.9rem;
            color: #6c757d;
            margin: 0;
        }
        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #6c757d;
            font-size: 13px;
            text-decoration: none;
        }
        .back-link:hover { color: #333; }
    </style>
</head>
<body>

<div class="portal-wrapper">
    <h2>⚕️ Admin Portal</h2>
    <p>Choose an option to manage</p>

    <div class="row g-4 justify-content-center">

        <!-- Card 1: Add a New Doctor -->
        <div class="col-md-5">
            <a th:href="@{/admin/add-doctor}" class="option-card doctor">
                <div class="option-icon">🩺</div>
                <h4>Add a New Doctor</h4>
                <p>Register a new doctor with their name and specialization</p>
            </a>
        </div>

        <!-- Card 2: Add a Prescription -->
        <div class="col-md-5">
            <a th:href="@{/prescription/add}" class="option-card prescription">
                <div class="option-icon">💊</div>
                <h4>Add a Prescription</h4>
                <p>Issue a new prescription for a patient with medication details</p>
            </a>
        </div>

    </div>

    <a href="/" class="back-link">← Return to Public Portal</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Medical Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Medical Records</h1>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/records}" method="get" class="row g-2 align-items-center">
                <div class="col-md-9">
                    <input type="text"
                           name="search"
                           class="form-control"
                           placeholder="Search by Record ID or Patient Name"
                           th:value="${searchQuery}">
                </div>
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-success">Search</button>
                </div>
                <div class="col-md-1 d-grid">
                    <a th:href="@{/records}" class="btn btn-outline-secondary">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/records/add}" th:object="${recordForm}" method="post" id="recordForm">
                <div class="row g-2">
                    <div class="col-md-2">
                        <input type="text" th:field="*{recordId}" class="form-control" placeholder="Record ID" required maxlength="20" />
                    </div>
                    <div class="col-md-2">
                        <input type="text" th:field="*{patientName}" class="form-control" placeholder="Patient Name" required maxlength="50" />
                    </div>
                    <div class="col-md-2">
                        <input type="text" th:field="*{disease}" class="form-control" placeholder="Disease" maxlength="50" />
                    </div>
                    <div class="col-md-3">
                        <input type="text" th:field="*{treatment}" class="form-control" placeholder="Treatment" maxlength="50" />
                    </div>
                    <div class="col-md-2">
                        <input type="text" th:field="*{doctorName}" class="form-control" placeholder="Doctor" maxlength="50" />
                    </div>
                    <div class="col-md-1 d-grid">
                        <button type="submit" id="submitButton" class="btn btn-primary">Add</button>
                    </div>
                    <div class="col-md-1 d-grid">
                        <button type="button" class="btn btn-outline-secondary" onclick="resetForm()">Reset</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="table-light">
        <tr>
            <th>Record ID</th>
            <th>Patient</th>
            <th>Disease</th>
            <th>Treatment</th>
            <th>Doctor</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="record : ${records}">
            <td th:text="${record.recordId}"></td>
            <td th:text="${record.patientName}"></td>
            <td th:text="${record.disease}"></td>
            <td th:text="${record.treatment}"></td>
            <td th:text="${record.doctorName}"></td>
            <td>
                <div class="btn-group" role="group">
                    <a th:href="@{/records/delete/{id}(id=${record.recordId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this record?');">Delete</a>
                    <button type="button"
                            class="btn btn-sm btn-secondary"
                            th:attr="data-id=${record.recordId},data-patient=${record.patientName},data-disease=${record.disease},data-treatment=${record.treatment},data-doctor=${record.doctorName}"
                            onclick="populateForm(this)">
                        Edit
                    </button>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    function populateForm(button) {
        const form = document.getElementById('recordForm');
        form.action = '/records/update';
        form.querySelector('[name="recordId"]').value = button.dataset.id;
        form.querySelector('[name="patientName"]').value = button.dataset.patient;
        form.querySelector('[name="disease"]').value = button.dataset.disease;
        form.querySelector('[name="treatment"]').value = button.dataset.treatment;
        form.querySelector('[name="doctorName"]').value = button.dataset.doctor;
        document.getElementById('submitButton').textContent = 'Update';
        form.scrollIntoView({behavior: 'smooth'});
    }

    function resetForm() {
        const form = document.getElementById('recordForm');
        form.action = '/records/add';
        form.reset();
        document.getElementById('submitButton').textContent = 'Add';
    }
</script>

</body>
</html>
